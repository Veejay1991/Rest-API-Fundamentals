name: Activate GitHub Coding Agent
on:
 workflow_dispatch:
    inputs:
      branch:
        required: true
        type: string
      description:
        required: true
        type: string
      issue_key:
        required: true
        type: string
      resumeUrl:
        type: string

permissions:
  actions: write # Required to let the GITHUB_TOKEN trigger another workflow

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for all branches and tags

      - name: Run Coding Agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ inputs.branch }}
          DESC: ${{ inputs.description }}
          ISSUE_KEY: ${{ inputs.issue_key }}
        run: |
          # Trigger the pre-compiled, committed workflow using standard gh cli
          gh workflow run jira-bug-fix.lock.yml -f branch="$BRANCH" -f description="$DESC" -f issue_key="$ISSUE_KEY"

          # 2. Smart Polling: Wait for the Run ID to appear in GitHub's database
          echo "Waiting for GitHub to register the workflow run..."
          RUN_ID=""
          for i in {1..12}; do
            sleep 5
            RUN_ID=$(gh run list --workflow="jira-bug-fix" --event="workflow_dispatch" --limit 1 --json databaseId -q '.[0].databaseId')
            if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
              echo "Found Run ID: $RUN_ID"
              break
            fi
            echo "Still waiting for GitHub to queue the run... ($i/12)"
          done

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" == "null" ]; then
            echo "Error: Workflow never started or couldn't be found."
            exit 1
          fi
          
          # 3. Custom Resilient Polling Loop (Survives GitHub 502 Errors)
          echo "Watching Agent Run ID: $RUN_ID. Waiting for AI to finish..."
          while true; do
            # Fetch status, ignore transient 502 API errors
            RUN_JSON=$(gh run view $RUN_ID --json status,conclusion 2>/dev/null || echo "")
            
            if [ -n "$RUN_JSON" ]; then
              RUN_STATUS=$(echo "$RUN_JSON" | jq -r .status)
              if [ "$RUN_STATUS" == "completed" ]; then
                echo "AI Agent finished successfully!"
                break
              fi
              echo "Run is $RUN_STATUS... waiting 15 seconds."
            else
              echo "GitHub API transient error (e.g. 502 Bad Gateway). Retrying in 15 seconds..."
            fi
            sleep 15
          done

          # 4. The agent finished! Ping n8n to resume the visual workflow
          echo "Notifying n8n to resume workflow... ${{ inputs.resumeUrl }}"
          curl -X POST "${{ inputs.resumeUrl }}" \
            -H "Content-Type: application/json" \
            -d '{
              "status": "success",
              "github_run_id": "${{ github.run_id }}",
              "repo": "${{ github.repository }}"
            }'
