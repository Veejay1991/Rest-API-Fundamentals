name: Activate GitHub Coding Agent
on:
 workflow_dispatch:
    inputs:
      branch:
        required: true
        type: string
      description:
        required: true
        type: string
      issue_key:
        required: true
        type: string
      resumeUrl:
        type: string

permissions:
  actions: write # Required to let the GITHUB_TOKEN trigger another workflow

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for all branches and tags

      - name: Run Coding Agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ inputs.branch }}
          DESC: ${{ inputs.description }}
          ISSUE_KEY: ${{ inputs.issue_key }}
        run: |
          # Trigger the pre-compiled, committed workflow using standard gh cli
          gh workflow run jira-bug-fix.lock.yml -f branch="$BRANCH" -f description="$DESC" -f issue_key="$ISSUE_KEY"

          # 2. Smart Polling: Wait for the Run ID to appear in GitHub's database
          echo "Waiting for GitHub to register the workflow run..."
          RUN_ID=""
          for i in {1..12}; do
            sleep 5
            
            # Fetch the absolute latest workflow_dispatch run, ignoring branch string mismatches
            RUN_ID=$(gh run list --workflow="jira-bug-fix" --event="workflow_dispatch" --limit 1 --json databaseId -q '.[0].databaseId')
            
            if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
              echo "Found Run ID: $RUN_ID"
              break
            fi
            echo "Still waiting for GitHub to queue the run... ($i/12)"
          done

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" == "null" ]; then
            echo "Error: Workflow never started or couldn't be found."
            exit 1
          fi
          
          # 3. Watch the run until the AI agent finishes
          echo "Watching Agent Run ID: $RUN_ID. Waiting for AI to finish..."
          gh run watch $RUN_ID || true

          # 5. The agent finished! Ping n8n to resume the visual workflow
          curl -X POST "${{ inputs.resumeUrl }}" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -d '{
              "status": "success",
              "github_run_id": "${{ github.run_id }}",
              "repo": "${{ github.repository }}"
            }'
