name: Activate GitHub Coding Agent
on:
  repository_dispatch:
    types: [jira-bug-report] 

permissions:
  actions: write # Required to let the GITHUB_TOKEN trigger another workflow

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Coding Agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BRANCH: ${{ github.event.client_payload.branch }}
          DESC: ${{ github.event.client_payload.description }}
          ISSUE_KEY: ${{ github.event.client_payload.issue_key }}
        run: |
          # Trigger the pre-compiled, committed workflow using standard gh cli
          gh workflow run jira-bug-fix.lock.yml -f branch="$BRANCH" -f description="$DESC" -f issue_key="$ISSUE_KEY"
