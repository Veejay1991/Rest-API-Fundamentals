name: Activate GitHub Coding Agent
on:
  repository_dispatch:
    types: [jira-bug-report] # Matches the 'event_type' from Jira

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install gh-aw CLI
        uses: github/gh-aw/actions/setup-cli@main # Official setup action

      - name: Run Coding Agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.event.client_payload.branch }}
          BUG_DESC: ${{ github.event.client_payload.description }}
          ISSUE_KEY: ${{ github.event.client_payload.issue_key }}
        run: |
          # Compile the MD intent into an executable Action
          gh aw compile jira-bug-fix.md 
          
          # Execute the agent with the Jira payload
          gh aw run jira-bug-fix
