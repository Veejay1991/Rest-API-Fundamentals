name: Activate GitHub Coding Agent
on:
  repository_dispatch:
    types: [jira-bug-report] # Matches the 'event_type' from Jira

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install gh-aw CLI
        uses: github/gh-aw/actions/setup-cli@main # Official setup action

      - name: Run Coding Agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Safely store the JSON payload in an environment variable to prevent quote-escaping errors in bash
          PAYLOAD_JSON: ${{ toJson(github.event.client_payload) }}
        run: |
          # 1. Compile first
          gh aw compile .github/workflows/jira-bug-fix.md
          
         # 2. Trigger the compiled workflow using standard gh cli, piping the JSON payload 
          echo "$PAYLOAD_JSON" | gh workflow run jira-bug-fix.lock.yml --json
