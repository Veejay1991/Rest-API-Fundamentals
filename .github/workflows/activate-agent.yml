name: Activate GitHub Coding Agent
on:
  repository_dispatch:
    types: [jira-bug-report] # Matches the 'event_type' from Jira

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install gh-aw CLI
        uses: github/gh-aw/actions/setup-cli@main # Official setup action
        
      - name: Run Coding Agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Map the payload directly to environment variables to handle multiline strings safely
          BRANCH: ${{ github.event.client_payload.branch }}
          DESC: ${{ github.event.client_payload.description }}
          ISSUE_KEY: ${{ github.event.client_payload.issue_key }}
        run: |
          # 1. Compile the local markdown file
          gh aw compile .github/workflows/jira-bug-fix.md
          
          # 2. Run the local compiled workflow, passing inputs via -f (field) flags
          gh aw run jira-bug-fix -f branch="$BRANCH" -f description="$DESC" -f issue_key="$ISSUE_KEY"
